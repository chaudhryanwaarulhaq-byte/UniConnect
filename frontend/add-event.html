<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Event | UniConnect</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Back to Dashboard</a>
</nav>

<div class="app-container">
    <h1>Add New Event</h1>
    <div class="form-wrapper">
        <form id="addEventForm" class="form-card">
            <label>Event Title</label>
            <input type="text" id="title" placeholder="e.g. Orientation Day" required>

            <label>Description</label>
            <textarea id="description" placeholder="Event details..." required></textarea>

            <label>Event Date</label>
            <input type="date" id="event_date" required>

            <button type="submit">Add Event</button>
            <p id="message"></p>
        </form>
    </div>
</div>

<script src="script.js"></script> 
</body>
</html>
