<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | UniConnect</title>
 <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="dashboard.html">Events</a>
  <a href="announcements.html">Announcements</a>
  <a href="resources.html">Resources</a>
</nav>

<!-- MAIN CONTAINER -->
<div class="container">

  <h1 style="text-align:center;">Dashboard</h1>

  <!-- DASHBOARD GRID -->
  <div class="dashboard-grid">

    <!-- LEFT: SYSTEM OVERVIEW -->
    <div class="chart-container">
      <h2>System Overview</h2>
      <canvas id="statsChart"></canvas>
    </div>

    <!-- RIGHT: STATS (ONE LINE) -->
    <div class="stats-container">
      <div class="stat-card">
        <h3>Total Events</h3>
        <p id="eventCount">3</p>
      </div>

      <div class="stat-card">
        <h3>Total Announcements</h3>
        <p id="announcementCount">1</p>
      </div>

      <div class="stat-card">
        <h3>Total Resources</h3>
        <p id="resourceCount">1</p>
      </div>
    </div>

  </div>

  <!-- ADD BUTTON -->
  <div style="margin:30px 0; text-align:right;">
    <a href="add-event.html" class="btn">+ Add New Event</a>
  </div>

  <!-- EVENTS TABLE -->
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="eventsTable">
      <!-- Loaded by script.js -->
    </tbody>
  </table>

</div>

<script src="./script.js"></script>
</body>
</html>
